<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>火柴人射击 · 横版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .game-container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            max-width: 1000px;
            width: 95%;
            margin: 20px auto;
        }
        canvas {
            background: linear-gradient(145deg, #74b9ff 0%, #a29bfe 100%);
            display: block;
            margin: 0 auto;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: none;
            width: 100%;
            height: auto;
            border: 3px solid white;
        }
        .info-panel {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 15px 30px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .score {
            font-size: 32px;
            font-weight: 700;
            color: #2d3436;
            background: white;
            padding: 8px 30px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            letter-spacing: 2px;
        }
        .restart-btn {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .controls {
            margin-top: 20px;
            color: #636e72;
            font-size: 16px;
            display: flex;
            gap: 30px;
            justify-content: center;
            background: white;
            padding: 12px 30px;
            border-radius: 50px;
            border: 1px solid #dfe6e9;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .key {
            background: linear-gradient(135deg, #dfe6e9 0%, #b2bec3 100%);
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            color: #2d3436;
            box-shadow: 0 3px 0 #636e72;
            margin: 0 5px;
            border: 1px solid white;
        }
        .status {
            color: #636e72;
            font-size: 16px;
            font-weight: 500;
            background: rgba(255,255,255,0.5);
            padding: 6px 20px;
            border-radius: 30px;
        }
        .game-title {
            font-size: 28px;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.05);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-title">🔥 火柴人射手 · 横版</div>
        
        <canvas id="gameCanvas" width="900" height="450"></canvas>
        
        <div class="info-panel">
            <span class="score" id="scoreDisplay">0</span>
            <span class="status">🎮 点击画面激活</span>
            <button class="restart-btn" onclick="resetGame()">↻ 重新开始</button>
        </div>
        
        <div class="controls">
            <span><span class="key">W</span> <span class="key">S</span> 上下移动</span>
            <span><span class="key">空格</span> 射击</span>
            <span>⚡ 击中敌人 +10分</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreDisplay');

        // 游戏状态
        let gameRunning = true;
        let score = 0;

        // 玩家火柴人（站在左边）
        let player = {
            x: 100,
            y: 225,
            width: 25,
            height: 45,
            speed: 5,
            color: '#ff7675'  // 珊瑚粉色，更显眼
        };

        // 子弹
        let bullets = [];
        const bulletSpeed = 8;
        const bulletSize = 8;

        // 敌人
        let enemies = [];
        const enemySpawnRate = 50;
        let frameCounter = 0;

        // 键盘控制
        let wPressed = false;
        let sPressed = false;
        let spacePressed = false;

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') {
                wPressed = true;
                e.preventDefault();
            }
            if (e.key === 's' || e.key === 'S') {
                sPressed = true;
                e.preventDefault();
            }
            if (e.key === ' ') {
                spacePressed = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W') {
                wPressed = false;
            }
            if (e.key === 's' || e.key === 'S') {
                sPressed = false;
            }
            if (e.key === ' ') {
                spacePressed = false;
            }
        });

        // 射击
        function shoot() {
            bullets.push({
                x: player.x + player.width + 10,
                y: player.y + player.height/2 - bulletSize/2,
                size: bulletSize,
                color: '#fdcb6e',  // 金色子弹
                vx: bulletSpeed,
                vy: 0
            });
        }

        // 生成敌人（多种颜色）
        function spawnEnemy() {
            const colors = ['#e17055', '#d63031', '#e84342', '#f39c12', '#e67e22'];
            enemies.push({
                x: canvas.width - 120,
                y: 50 + Math.random() * (canvas.height - 130),
                width: 22,
                height: 42,
                color: colors[Math.floor(Math.random() * colors.length)],
                speed: 1.8 + Math.random() * 2.5,
                direction: -1
            });
        }

        // 画火柴人（美化版）
        function drawStickman(x, y, width, height, color, isPlayer = false) {
            ctx.save();
            ctx.translate(x + width/2, y + height/2);
            
            // 头（带光泽）
            ctx.beginPath();
            ctx.arc(0, -height/2 + 12, 10, 0, Math.PI * 2);
            
            // 头部渐变
            const gradient = ctx.createRadialGradient(-3, -height/2 + 8, 2, 0, -height/2 + 12, 12);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, '#2d3436');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 眼睛
            ctx.beginPath();
            ctx.arc(-4, -height/2 + 9, 2, 0, Math.PI * 2);
            ctx.arc(4, -height/2 + 9, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-4, -height/2 + 9, 1, 0, Math.PI * 2);
            ctx.arc(4, -height/2 + 9, 1, 0, Math.PI * 2);
            ctx.fillStyle = '#2d3436';
            ctx.fill();
            
            // 身体
            ctx.beginPath();
            ctx.moveTo(0, -height/2 + 22);
            ctx.lineTo(0, height/2 - 5);
            ctx.strokeStyle = '#2d3436';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 腿
            ctx.beginPath();
            ctx.moveTo(0, height/2 - 5);
            ctx.lineTo(-12, height/2 + 8);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, height/2 - 5);
            ctx.lineTo(12, height/2 + 8);
            ctx.stroke();
            
            // 手臂（动态效果）
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-14, 8);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(14, 8);
            ctx.stroke();
            
            ctx.restore();
            
            // 玩家拿枪
            if (isPlayer) {
                ctx.fillStyle = '#636e72';
                ctx.fillRect(x + width - 5, y + height/2 - 4, 25, 8);
                ctx.fillStyle = '#2d3436';
                ctx.fillRect(x + width + 18, y + height/2 - 6, 8, 12);
            }
        }

        function update() {
            if (!gameRunning) return;

            // 玩家上下移动
            if (wPressed && player.y > 20) {
                player.y -= player.speed;
            }
            if (sPressed && player.y < canvas.height - player.height - 20) {
                player.y += player.speed;
            }

            // 射击
            if (spacePressed) {
                shoot();
                spacePressed = false;
            }

            // 子弹移动
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bulletSpeed;
                
                if (bullets[i].x > canvas.width) {
                    bullets.splice(i, 1);
                    continue;
                }
                
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (bullets[i] && 
                        bullets[i].x < enemies[j].x + enemies[j].width &&
                        bullets[i].x + bullets[i].size > enemies[j].x &&
                        bullets[i].y < enemies[j].y + enemies[j].height &&
                        bullets[i].y + bullets[i].size > enemies[j].y) {
                        
                        bullets.splice(i, 1);
                        enemies.splice(j, 1);
                        score += 10;
                        scoreElement.innerText = score;
                        break;
                    }
                }
            }

            // 敌人移动
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].x += enemies[i].speed * enemies[i].direction;
                
                // 碰到玩家
                if (enemies[i].x < player.x + player.width &&
                    enemies[i].x + enemies[i].width > player.x &&
                    enemies[i].y < player.y + player.height &&
                    enemies[i].y + enemies[i].height > player.y) {
                    gameRunning = false;
                    alert(`🎮 游戏结束！\n\n最终得分: ${score}`);
                    break;
                }
                
                if (enemies[i].x < -60) {
                    enemies.splice(i, 1);
                }
            }

            // 生成敌人
            frameCounter++;
            if (frameCounter % enemySpawnRate === 0) {
                spawnEnemy();
            }
        }

        function draw() {
            // 渐变背景（天空效果）
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
            gradient.addColorStop(0, '#74b9ff');
            gradient.addColorStop(0.5, '#a29bfe');
            gradient.addColorStop(1, '#81ecec');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 装饰云朵
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.arc(200, 80, 40, 0, Math.PI*2);
            ctx.arc(250, 60, 35, 0, Math.PI*2);
            ctx.arc(150, 60, 30, 0, Math.PI*2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(700, 150, 50, 0, Math.PI*2);
            ctx.arc(750, 130, 40, 0, Math.PI*2);
            ctx.arc(650, 130, 35, 0, Math.PI*2);
            ctx.fill();
            
            // 地面
            ctx.fillStyle = 'rgba(45, 52, 54, 0.1)';
            ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
            
            // 画玩家
            drawStickman(player.x, player.y, player.width, player.height, player.color, true);
            
            // 画子弹（带拖尾效果）
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.shadowColor = '#fdcb6e';
                ctx.shadowBlur = 10;
                ctx.fillRect(bullet.x, bullet.y, bullet.size, bullet.size);
                ctx.shadowBlur = 0;
            });
            
            // 画敌人
            enemies.forEach(enemy => {
                drawStickman(enemy.x, enemy.y, enemy.width, enemy.height, enemy.color);
            });
        }

        function gameLoop() {
            if (gameRunning) {
                update();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            gameRunning = true;
            score = 0;
            bullets = [];
            enemies = [];
            player.y = 225;
            frameCounter = 0;
            scoreElement.innerText = '0';
        }

        canvas.addEventListener('click', () => {
            canvas.focus();
        });

        gameLoop();
    </script>
</body>
</html>
