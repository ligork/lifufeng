        body {

            background: #ffffff;  /* 白色背景 */
            min-height: 100vh;

            justify-content: center;
            align-items: center;
            padding: 20px;
            line-height: 1.6;
        }
        
        /* 主卡片 */
        .main-card {
            max-width: 1200px;
            width: 100%;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,100,200,0.1);  /* 蓝色调阴影 */
            overflow: hidden;
            padding: 40px;
            border: 1px solid #e6f0ff;
        }
        
        /* ======= 头部区域（金色点缀）======= */
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }
        
        .header::after {
            content: "";
            display: block;
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #FFD700, #FFA500, #1E90FF);  /* 金-橙-蓝渐变 */
            margin: 20px auto 0;
            border-radius: 2px;
        }
        
        .name {
            font-size: 52px;
            font-weight: 700;
            background: linear-gradient(135deg, #1E90FF, #FFA500, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 5px 15px rgba(30,144,255,0.2);
        }
        
        .title {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            color: #34495e;
            margin-top: 15px;
        }
        
        .contact-info span {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: #f8fcff;
            border-radius: 50px;
            border: 1px solid #d4e6ff;
            transition: all 0.3s;
        }
        
        .contact-info span:hover {
            border-color: #FFA500;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,165,0,0.2);
        }
        
        .contact-info span i {  /* 模拟图标 */
            color: #1E90FF;
            font-style: normal;
            font-weight: 600;
        }
        
        /* ======= 三个主要板块（网格布局）======= */
        .sections-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
            margin: 40px 0;
        }

        .section {
            background: #ffffff;
            border-radius: 20px;

            border: 1px solid #f0f8ff;
            transition: all 0.3s;
        }

            border-color: #FFD700;

        }

            align-items: center;
            gap: 8px;
        }

            padding: 2px 8px;
            border-radius: 20px;
        }
