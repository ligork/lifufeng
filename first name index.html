<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李富峰的个人站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #ffffff;
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #1E90FF;
            border-bottom: 3px solid #FFD700;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .post {
            margin: 30px 0;
            padding: 20px;
            background: #f8fcff;
            border-radius: 10px;
            border-left: 4px solid #1E90FF;
        }
        .date {
            color: #FFA500;
            font-size: 14px;
            margin: 5px 0 15px;
        }
        .contact {
            margin-top: 50px;
            padding: 25px;
            background: #f0f7ff;
            border-radius: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>李富峰</h1>
    <p class="date">📅 今天是 <span id="today"></span></p>
    
    <div class="post">
        <h2>我的第一篇文章</h2>
        <p class="date">📅 2026-03-05</p>
        <p>这里写你的文章内容，可以是个人介绍、学习心得、项目总结等。</p>
    </div>
    
    <div class="post">
        <h2>关于设计的一些思考</h2>
        <p class="date">📅 2026-03-01</p>
        <p>分享你的观点和想法，纯文字展示，不需要服务器。</p>
    </div>
    
    <div class="contact">
        <h3>📞 联系我</h3>
        <p>邮箱：你的邮箱@example.com</p>
        <p>GitHub：ligork</p>
    </div>
    
    <script>
        const today = new Date();
        document.getElementById('today').innerText = 
            today.getFullYear() + '-' + 
            String(today.getMonth()+1).padStart(2,'0') + '-' + 
            String(today.getDate()).padStart(2,'0');
    </script>
</body>
</html>
